# Example Detekt configuration. Remove this file (and it will be
# auto-skipped by lint.yml) if your project doesn't use Detekt, or replace
# it with your team's real ruleset.
build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LargeClass:
    threshold: 600
  ComplexMethod:
    threshold: 15

coroutines:
  GlobalCoroutineUsage:
    active: true
  SuspendFunWithFlowReturnType:
    active: true

potential-bugs:
  UnsafeCallOnNullableType:
    active: true

style:
  ForbiddenComment:
    active: false
  MaxLineLength:
    maxLineLength: 140
